name: Release

on:
  push:
    tags:
      # Only run for version tags in the form vX.Y.Z
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  # Required to push images to the GitHub Container Registry (ghcr.io)
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.3"

      - name: Verify tag matches version.json
        id: version
        run: |
          # Tag without the leading "v"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          # Version as declared in the project (JSON string -> raw value)
          FILE_VERSION="$(jq -r . src/version.json)"

          echo "Tag version:  $TAG_VERSION"
          echo "File version: $FILE_VERSION"

          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match version.json ('$FILE_VERSION')"
            exit 1
          fi

          echo "version=$FILE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute lowercase image name
        id: image
        run: |
          # ghcr.io requires the repository/owner path to be lowercase
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${OWNER}/web-tether" >> "$GITHUB_OUTPUT"

      - name: Compile application
        run: deno task compile

      - name: Create GitHub release with dist assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_JS=dist/web-tether_${{ steps.version.outputs.version }}.js
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
